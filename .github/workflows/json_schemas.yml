name: "Test JSON Schema Creation"
on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  docbuild:
    name: Check JSON Schema Creation
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.10", "3.11"] # https://github.com/Hochfrequenz/ahbicht/issues/358
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9.0.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group json_schemas
      - name: Check JSON Schemas
        run: uv run python json_schemas/generate_json_schemas.py
