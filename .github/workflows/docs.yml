name: "Test Doc Creation (Sphinx)"
on:
  push:
    branches: [main]
  pull_request: {}
jobs:
  docbuild:
    name: Check Docs
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.11"] # https://github.com/Hochfrequenz/ahbicht/issues/357
        os: [ubuntu-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install uv
        uses: astral-sh/setup-uv@v9
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: uv sync --group docs
      - name: Check Docs
        run: |
          uv run sphinx-build -W -b html -d docs/_build/doctrees docs docs/_build/html
          uv run sphinx-build -n -T -W -b doctest -d docs/_build/doctrees docs docs/_build/html
          uv run python -m doctest README.rst
